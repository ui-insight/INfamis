name: Documentation Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-build:
    name: MkDocs Build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Check template docs integrity
        run: python scripts/check_template_docs.py

      - name: Build docs (strict mode)
        run: mkdocs build --strict
