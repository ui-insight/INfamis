name: Generate SBOM

on:
  push:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "backend/pyproject.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/sbom.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "backend/pyproject.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/sbom.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom-python:
    name: Generate Python SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install CycloneDX generator
        run: pip install cyclonedx-bom

      - name: Generate Python SBOM
        run: cyclonedx-py environment -o sbom-python.cdx.json --output-format json

      - name: Upload Python SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-python
          path: sbom-python.cdx.json
          retention-days: 90

  sbom-javascript:
    name: Generate JavaScript SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install CycloneDX npm plugin
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate JavaScript SBOM
        working-directory: frontend
        run: cyclonedx-npm --output-file ../sbom-javascript.cdx.json --output-format JSON

      - name: Upload JavaScript SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-javascript
          path: sbom-javascript.cdx.json
          retention-days: 90
